name: binaries

# Builds and clean-room smoketests the standalone CLI binaries. Called from
# the release workflow on tags (full matrix + online tests), runnable on its
# own via workflow_dispatch, and run on pull requests that touch the packaging
# inputs (linux-x86_64-gnu only, offline tests — cheap import-coverage gate).
on:
  workflow_dispatch:
    inputs:
      online_smoketest:
        description: Run read-only online smoketests
        type: boolean
        default: true
  workflow_call:
    secrets:
      CLOUDSMITH_API_KEY:
        description: Read-only API key for the online smoketests
        required: false
  pull_request:
    paths:
      - packaging/**
      - pyproject.toml
      - uv.lock
      - .github/workflows/binaries.yml

permissions:
  contents: read

concurrency:
  group: binaries-${{ github.ref }}
  cancel-in-progress: true

jobs:
  matrix:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      include: ${{ steps.gen.outputs.include }}
    steps:
      # Pull requests build only the cheap baseline target; everything else
      # (dispatch, release) gets the full matrix.
      - id: gen
        env:
          EVENT: ${{ github.event_name }}
        run: |
          MATRIX=$(jq -c . <<'JSON'
          {"include":[
            {"name":"linux-x86_64-gnu","build_runner":"ubuntu-24.04","mode":"native","test_runner":"ubuntu-24.04","test_kind":"docker","image":"debian:stable-slim","archive":".tar.gz"},
            {"name":"linux-x86_64-musl","build_runner":"ubuntu-24.04","mode":"alpine","test_runner":"ubuntu-24.04","test_kind":"docker","image":"alpine:3.20","archive":".tar.gz"},
            {"name":"linux-aarch64-gnu","build_runner":"ubuntu-24.04-arm","mode":"native","test_runner":"ubuntu-24.04-arm","test_kind":"docker","image":"debian:stable-slim","archive":".tar.gz"},
            {"name":"linux-aarch64-musl","build_runner":"ubuntu-24.04-arm","mode":"alpine","test_runner":"ubuntu-24.04-arm","test_kind":"docker","image":"alpine:3.20","archive":".tar.gz"},
            {"name":"macos-arm64","build_runner":"macos-14","mode":"native","test_runner":"macos-14","test_kind":"macos","image":"","archive":".tar.gz"},
            {"name":"macos-x86_64","build_runner":"macos-15-intel","mode":"native","test_runner":"macos-15-intel","test_kind":"macos","image":"","archive":".tar.gz"},
            {"name":"windows-x86_64","build_runner":"windows-2025","mode":"native","test_runner":"windows-2025","test_kind":"windows","image":"","archive":".zip"}
          ]}
          JSON
          )
          if [ "${EVENT}" = "pull_request" ]; then
            MATRIX=$(printf '%s' "${MATRIX}" | jq -c '{include: [.include[] | select(.name == "linux-x86_64-gnu")]}')
          fi
          echo "include=${MATRIX}" >> "$GITHUB_OUTPUT"

  build:
    needs: matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.include) }}
    runs-on: ${{ matrix.build_runner }}
    timeout-minutes: 45
    env:
      PYINSTALLER_VERSION: "6.20.0"
      PYTHON_VERSION: "3.12"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - if: matrix.mode != 'alpine'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - id: art
        shell: bash
        env:
          TARGET: ${{ matrix.name }}
          ARCHIVE: ${{ matrix.archive }}
        run: echo "name=cloudsmith-$(cat cloudsmith_cli/data/VERSION)-${TARGET}${ARCHIVE}" >> "$GITHUB_OUTPUT"

      - if: matrix.mode == 'native'
        shell: bash
        env:
          ART: ${{ steps.art.outputs.name }}
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -c packaging/constraints.txt . "pyinstaller==${PYINSTALLER_VERSION}"
          pyinstaller --clean --noconfirm packaging/pyinstaller/cloudsmith.spec
          mkdir -p out
          case "${ART}" in
            *.zip) (cd dist && 7z a -bso0 "../out/${ART}" cloudsmith) ;;
            *)     tar -czf "out/${ART}" -C dist cloudsmith ;;
          esac

      - if: matrix.mode == 'alpine'
        env:
          ART: ${{ steps.art.outputs.name }}
        run: |
          set -euo pipefail
          mkdir -p out
          docker run --rm \
            -e PYINSTALLER_VERSION="${PYINSTALLER_VERSION}" \
            -e ART="${ART}" \
            -v "${PWD}:/src" -w /src \
            python:3.12-alpine sh -c '
              set -e
              apk add --no-cache build-base zlib-dev libffi-dev >/dev/null
              python -m pip install --root-user-action=ignore --upgrade pip >/dev/null
              pip install --root-user-action=ignore -c packaging/constraints.txt . "pyinstaller==${PYINSTALLER_VERSION}" >/dev/null
              pyinstaller --clean --noconfirm packaging/pyinstaller/cloudsmith.spec
              tar -czf "out/${ART}" -C dist cloudsmith
            '

      - shell: bash
        env:
          ART: ${{ steps.art.outputs.name }}
        run: |
          set -euo pipefail
          cd out
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${ART}" | tee "${ART}.sha256"
          else
            shasum -a 256 "${ART}" | tee "${ART}.sha256"
          fi

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cloudsmith-${{ matrix.name }}
          path: out/
          retention-days: 14
          if-no-files-found: error

  test:
    needs: [matrix, build]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.include) }}
    runs-on: ${{ matrix.test_runner }}
    timeout-minutes: 25
    # Online read-only smoketest runs on every target. It hits the shared org,
    # so it stays read-only and the smoketest treats a 429 as a pass (the org
    # throttling concurrent jobs is not a binary failure). Each binary is tested
    # in its own runtime: musl in Alpine, glibc in Debian, macOS/Windows native.
    env:
      ONLINE: ${{ (github.event_name == 'push' || inputs.online_smoketest) && '1' || '' }}
      CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
      CLOUDSMITH_NAMESPACE: ${{ vars.CLOUDSMITH_NAMESPACE }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cloudsmith-${{ matrix.name }}
          path: ./dl

      - name: Verify checksum
        shell: bash
        run: |
          set -euo pipefail
          cd dl
          ART=$(ls | grep -v '\.sha256$' | head -1)
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum -c "${ART}.sha256"
          else
            shasum -a 256 -c "${ART}.sha256"
          fi

      - if: matrix.test_kind == 'docker'
        env:
          IMAGE: ${{ matrix.image }}
        run: |
          set -euo pipefail
          ART=$(ls dl | grep -v '\.sha256$' | head -1)
          tar -xzf "dl/${ART}" -C .
          docker run --rm -v "${PWD}:/w" -w /w "${IMAGE}" sh -c '
            if command -v python3 >/dev/null 2>&1; then echo "python3 present on host"; exit 1; fi
            sh packaging/smoketest.sh cloudsmith/cloudsmith offline
          '
          if [ -n "${ONLINE}" ] && [ -n "${CLOUDSMITH_API_KEY:-}" ]; then
            docker run --rm \
              -e CLOUDSMITH_API_KEY -e CLOUDSMITH_NAMESPACE \
              -v "${PWD}:/w" -w /w "${IMAGE}" sh -c '
                sh packaging/smoketest.sh cloudsmith/cloudsmith online
              '
          fi

      - if: matrix.test_kind == 'macos'
        run: |
          set -euo pipefail
          ART=$(ls dl | grep -v '\.sha256$' | head -1)
          tar -xzf "dl/${ART}" -C .
          codesign -s - -f cloudsmith/cloudsmith || true
          env -i HOME="${HOME}" TMPDIR="${TMPDIR:-/tmp}" "${PWD}/cloudsmith/cloudsmith" --version
          sh packaging/smoketest.sh cloudsmith/cloudsmith offline
          if [ -n "${ONLINE}" ] && [ -n "${CLOUDSMITH_API_KEY:-}" ]; then
            sh packaging/smoketest.sh cloudsmith/cloudsmith online
          fi

      - if: matrix.test_kind == 'windows'
        shell: bash
        run: |
          set -euo pipefail
          ART=$(ls dl | grep -v '\.sha256$' | head -1)
          7z x -bso0 "dl/${ART}" -o.
          sh packaging/smoketest.sh cloudsmith/cloudsmith.exe offline
          if [ -n "${ONLINE}" ] && [ -n "${CLOUDSMITH_API_KEY:-}" ]; then
            sh packaging/smoketest.sh cloudsmith/cloudsmith.exe online
          fi

  # Authenticate with NO static key: GitHub Actions issues an OIDC JWT (needs
  # id-token: write), the CLI's OIDC auto-discovery exchanges it at Cloudsmith
  # for the service account, decodes the returned token (exercises pyjwt +
  # cryptography) and calls the API (requests TLS). This is the only test that
  # forces the native auth-crypto path. Requires an OIDC provider configured on
  # the org trusting this repository for the CLOUDSMITH_SERVICE_SLUG account.
  oidc:
    needs: [matrix, build]
    if: ${{ github.event_name == 'push' || inputs.online_smoketest }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
    env:
      CLOUDSMITH_ORG: ${{ vars.CLOUDSMITH_NAMESPACE }}
      CLOUDSMITH_SERVICE_SLUG: ${{ vars.CLOUDSMITH_SERVICE_SLUG }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cloudsmith-linux-x86_64-gnu
          path: ./dl

      - run: |
          set -euo pipefail
          ART=$(ls dl | grep -v '\.sha256$' | head -1)
          tar -xzf "dl/${ART}" -C .
          unset CLOUDSMITH_API_KEY
          OUT=$(cloudsmith/cloudsmith whoami 2>&1) || { printf '%s\n' "$OUT"; exit 1; }
          printf '%s\n' "$OUT"
          if printf '%s' "$OUT" | grep -qiE 'anonymous|Nobody'; then
            echo "FAIL: OIDC auth did not occur (still anonymous)"; exit 1
          fi
          echo "OIDC authentication OK (no static key used)"
