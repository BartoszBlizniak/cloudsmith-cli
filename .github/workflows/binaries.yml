name: binaries

on:
  workflow_dispatch:
    inputs:
      online_smoketest:
        description: Run read-only online smoketest on linux-x86_64-gnu
        type: boolean
        default: true
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: binaries-${{ github.ref }}
  cancel-in-progress: true

jobs:
  matrix:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      include: ${{ steps.gen.outputs.include }}
    steps:
      - id: gen
        run: |
          echo "include=$(jq -c . <<'JSON'
          {"include":[
            {"name":"linux-x86_64-gnu","build_runner":"ubuntu-24.04","mode":"native","test_runner":"ubuntu-24.04","test_kind":"docker","image":"debian:stable-slim","archive":".tar.gz"},
            {"name":"linux-x86_64-musl","build_runner":"ubuntu-24.04","mode":"alpine","test_runner":"ubuntu-24.04","test_kind":"docker","image":"alpine:3.20","archive":".tar.gz"},
            {"name":"linux-aarch64-gnu","build_runner":"ubuntu-24.04-arm","mode":"native","test_runner":"ubuntu-24.04-arm","test_kind":"docker","image":"debian:stable-slim","archive":".tar.gz"},
            {"name":"linux-aarch64-musl","build_runner":"ubuntu-24.04-arm","mode":"alpine","test_runner":"ubuntu-24.04-arm","test_kind":"docker","image":"alpine:3.20","archive":".tar.gz"},
            {"name":"macos-arm64","build_runner":"macos-14","mode":"native","test_runner":"macos-14","test_kind":"macos","image":"","archive":".tar.gz"},
            {"name":"macos-x86_64","build_runner":"macos-15-intel","mode":"native","test_runner":"macos-15-intel","test_kind":"macos","image":"","archive":".tar.gz"},
            {"name":"windows-x86_64","build_runner":"windows-2025","mode":"windows","test_runner":"windows-2025","test_kind":"windows","image":"","archive":".zip"}
          ]}
          JSON
          )" >> "$GITHUB_OUTPUT"

  build:
    needs: matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.include) }}
    runs-on: ${{ matrix.build_runner }}
    timeout-minutes: 45
    env:
      PYINSTALLER_VERSION: "6.20.0"
      PYTHON_VERSION: "3.12"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - if: matrix.mode != 'alpine'
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - id: art
        shell: bash
        env:
          TARGET: ${{ matrix.name }}
          ARCHIVE: ${{ matrix.archive }}
        run: echo "name=cloudsmith-$(cat cloudsmith_cli/data/VERSION)-${TARGET}${ARCHIVE}" >> "$GITHUB_OUTPUT"

      - if: matrix.mode == 'native'
        shell: bash
        env:
          ART: ${{ steps.art.outputs.name }}
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install . "pyinstaller==${PYINSTALLER_VERSION}"
          pyinstaller --clean --noconfirm packaging/pyinstaller/cloudsmith.spec
          mkdir -p out
          tar -czf "out/${ART}" -C dist cloudsmith

      - if: matrix.mode == 'alpine'
        env:
          ART: ${{ steps.art.outputs.name }}
        run: |
          set -euo pipefail
          mkdir -p out
          docker run --rm \
            -e PYINSTALLER_VERSION="${PYINSTALLER_VERSION}" \
            -e ART="${ART}" \
            -v "${PWD}:/src" -w /src \
            python:3.12-alpine sh -c '
              set -e
              apk add --no-cache build-base zlib-dev libffi-dev >/dev/null
              python -m pip install --root-user-action=ignore --upgrade pip >/dev/null
              pip install --root-user-action=ignore . "pyinstaller==${PYINSTALLER_VERSION}" >/dev/null
              pyinstaller --clean --noconfirm packaging/pyinstaller/cloudsmith.spec
              tar -czf "out/${ART}" -C dist cloudsmith
            '

      - if: matrix.mode == 'windows'
        shell: bash
        env:
          ART: ${{ steps.art.outputs.name }}
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install . "pyinstaller==${PYINSTALLER_VERSION}"
          pyinstaller --clean --noconfirm packaging/pyinstaller/cloudsmith.spec
          mkdir -p out
          (cd dist && 7z a -bso0 "../out/${ART}" cloudsmith)

      - shell: bash
        env:
          ART: ${{ steps.art.outputs.name }}
        run: |
          set -euo pipefail
          cd out
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${ART}" | tee "${ART}.sha256"
          else
            shasum -a 256 "${ART}" | tee "${ART}.sha256"
          fi

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cloudsmith-${{ matrix.name }}
          path: out/
          retention-days: 14
          if-no-files-found: error

  test:
    needs: [matrix, build]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.include) }}
    runs-on: ${{ matrix.test_runner }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cloudsmith-${{ matrix.name }}
          path: ./dl

      - if: matrix.test_kind == 'docker'
        env:
          IMAGE: ${{ matrix.image }}
        run: |
          set -euo pipefail
          ART=$(ls dl | grep -v '\.sha256$' | head -1)
          tar -xzf "dl/${ART}" -C .
          docker run --rm -v "${PWD}:/w" -w /w "${IMAGE}" sh -c '
            if command -v python3 >/dev/null 2>&1; then echo "python3 present on host"; exit 1; fi
            sh packaging/smoketest.sh cloudsmith/cloudsmith offline
          '

      - if: matrix.test_kind == 'macos'
        run: |
          set -euo pipefail
          ART=$(ls dl | grep -v '\.sha256$' | head -1)
          tar -xzf "dl/${ART}" -C .
          codesign -s - -f cloudsmith/cloudsmith || true
          env -i HOME="${HOME}" TMPDIR="${TMPDIR:-/tmp}" "${PWD}/cloudsmith/cloudsmith" --version
          sh packaging/smoketest.sh cloudsmith/cloudsmith offline

      - if: matrix.test_kind == 'windows'
        shell: bash
        run: |
          set -euo pipefail
          ART=$(ls dl | grep -v '\.sha256$' | head -1)
          7z x -bso0 "dl/${ART}" -o.
          sh packaging/smoketest.sh cloudsmith/cloudsmith.exe offline

      - name: Online read-only smoketest
        if: ${{ matrix.name == 'linux-x86_64-gnu' && (github.event_name == 'push' || inputs.online_smoketest) }}
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
          CLOUDSMITH_NAMESPACE: ${{ vars.CLOUDSMITH_NAMESPACE }}
        run: |
          set -euo pipefail
          [ -n "${CLOUDSMITH_API_KEY:-}" ] || { echo "CLOUDSMITH_API_KEY unset; skipping online smoketest"; exit 0; }
          sh packaging/smoketest.sh cloudsmith/cloudsmith online
