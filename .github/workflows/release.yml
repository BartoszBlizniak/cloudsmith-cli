name: Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: read

concurrency:
    group: release-${{ github.ref }}

jobs:
    # Build and clean-room smoketest the standalone binaries for every target.
    # Publishing below reuses these exact artifacts, so what ships is what
    # passed the smoketests.
    binaries:
        name: Binaries
        uses: ./.github/workflows/binaries.yml
        permissions:
            contents: read
            id-token: write
        secrets:
            CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}

    # Publish to GitHub and Cloudsmith (binaries + Python packages + Docker)
    publish:
        name: Publish release artifacts
        needs: binaries
        runs-on: ubuntu-latest
        permissions:
            id-token: write
            contents: write
        env:
            CLOUDSMITH_NAMESPACE: ${{ vars.CLOUDSMITH_NAMESPACE }}
            CLOUDSMITH_REPO: ${{ vars.CLOUDSMITH_REPO }}
            CLOUDSMITH_SVC_SLUG: ${{ vars.CLOUDSMITH_SVC_SLUG }}
            DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USER }}
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  persist-credentials: false

            - name: Set up Python 3.10
              uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
              with:
                  python-version: '3.10'

            - name: Get version
              run: echo "VERSION=$(cat cloudsmith_cli/data/VERSION)" >> $GITHUB_ENV

            - name: Download binary artifacts
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  pattern: cloudsmith-*
                  merge-multiple: true
                  path: binaries

            - name: Create Release and upload binaries
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: gh release create "${GITHUB_REF_NAME}" binaries/* --title "Release v${VERSION}" --notes ""

            - name: Install and authenticate Cloudsmith CLI
              uses: cloudsmith-io/cloudsmith-cli-action@159f1619275d5d3147f059c3cc110938ec221d16 # v2.0.3
              with:
                  oidc-namespace: ${{ vars.CLOUDSMITH_NAMESPACE }}
                  oidc-service-slug: ${{ vars.CLOUDSMITH_SVC_SLUG }}

            # Each archive is pushed as its own raw package named after the
            # target (e.g. cloudsmith-cli-linux-x86_64-musl); the Docker image
            # build below pulls the musl binaries from here.
            - name: Push binaries to Cloudsmith
              run: |
                  for f in binaries/*.tar.gz binaries/*.zip; do
                    [ -e "$f" ] || continue
                    target=$(basename "$f")
                    target="${target#cloudsmith-${VERSION}-}"
                    target="${target%.tar.gz}"
                    target="${target%.zip}"
                    cloudsmith push raw "${CLOUDSMITH_NAMESPACE}/${CLOUDSMITH_REPO}" "$f" --name "cloudsmith-cli-${target}" --version "${VERSION}"
                  done

            - name: Build Python packages
              run: |
                  python -m pip install --upgrade pip build
                  python -m build

            - name: Push source distribution to Cloudsmith
              run: cloudsmith push python "${CLOUDSMITH_NAMESPACE}/cli" dist/*.tar.gz

            - name: Push wheel to Cloudsmith
              run: cloudsmith push python "${CLOUDSMITH_NAMESPACE}/cli" dist/*.whl

            - name: Set up QEMU for multi-arch
              uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

            - name: Push Dockerised CLI to Cloudsmith (multi-arch)
              id: push_dockerised_cli_cloudsmith
              run: |
                echo "${CLOUDSMITH_API_KEY}" | docker login docker.cloudsmith.io -u "${CLOUDSMITH_SVC_SLUG}" --password-stdin
                docker buildx build \
                  --platform linux/amd64,linux/arm64 \
                  --build-arg "CLOUDSMITH_CLI_VERSION=${VERSION}" \
                  --build-arg "CLOUDSMITH_NAMESPACE=${CLOUDSMITH_NAMESPACE}" \
                  --build-arg "CLOUDSMITH_REPO=${CLOUDSMITH_REPO}" \
                  -t "docker.cloudsmith.io/${CLOUDSMITH_NAMESPACE}/${CLOUDSMITH_REPO}/cloudsmith-cli:${VERSION}" \
                  --push .

            - name: Push Dockerised CLI to DockerHub (multi-arch)
              id: push_dockerised_cli_dockerhub
              env:
                  DOCKERHUB_PAT: ${{ secrets.DOCKERHUB_PAT }}
              run: |
                echo "${DOCKERHUB_PAT}" | docker login -u "${DOCKERHUB_USER}" --password-stdin
                docker buildx build \
                  --platform linux/amd64,linux/arm64 \
                  --build-arg "CLOUDSMITH_CLI_VERSION=${VERSION}" \
                  --build-arg "CLOUDSMITH_NAMESPACE=${CLOUDSMITH_NAMESPACE}" \
                  --build-arg "CLOUDSMITH_REPO=${CLOUDSMITH_REPO}" \
                  -t "cloudsmith/cloudsmith-cli:${VERSION}" \
                  --push .

    # Publish Python packages to PyPI
    publish-pypi:
        name: Publish to PyPI
        needs: binaries
        runs-on: ubuntu-latest
        environment: release
        permissions:
            id-token: write
            contents: read
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  persist-credentials: false

            - name: Set up Python 3.10
              uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
              with:
                  python-version: '3.10'

            - name: Build packages
              run: |
                  python -m pip install --upgrade pip build
                  python -m build

            - name: Publish to PyPI
              uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
              with:
                  packages-dir: dist/
