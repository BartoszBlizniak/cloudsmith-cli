name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - id: version
        name: Validate tag and package version
        run: |
          set -euo pipefail
          VERSION=$(cat cloudsmith_cli/data/VERSION)
          test "${GITHUB_REF_NAME}" = "v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  binaries:
    name: Binaries
    needs: validate
    uses: ./.github/workflows/binaries.yml
    with:
      online_smoketest: true
    permissions:
      contents: read
      id-token: write
    secrets:
      CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}

  python-distributions:
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.10"

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      - name: Build and validate once
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          uv sync --locked --group release
          uv build --clear
          SDIST="dist/cloudsmith_cli-${VERSION}.tar.gz"
          WHEEL="dist/cloudsmith_cli-${VERSION}-py3-none-any.whl"
          test -f "${SDIST}"
          test -f "${WHEEL}"
          uv run --group release twine check "${SDIST}" "${WHEEL}"
          uv run --group release check-wheel-contents "${WHEEL}"
          python - <<'PY'
          import os
          import zipfile

          wheel = f"dist/cloudsmith_cli-{os.environ['VERSION']}-py3-none-any.whl"
          with zipfile.ZipFile(wheel) as archive:
              names = archive.namelist()
          forbidden = [
              name
              for name in names
              if name.startswith("packaging/")
              or "/tests/" in name
              or name.startswith("tests/")
          ]
          if forbidden:
              raise SystemExit(f"wheel contains non-runtime files: {forbidden}")
          PY
          python -m venv /tmp/cloudsmith-release-install
          /tmp/cloudsmith-release-install/bin/python -m pip install "${WHEEL}"
          OUTPUT=$(/tmp/cloudsmith-release-install/bin/cloudsmith --version)
          printf '%s\n' "${OUTPUT}"
          printf '%s\n' "${OUTPUT}" | grep -Fq "CLI Package Version: ${VERSION}"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-distributions
          path: dist/
          retention-days: 14
          if-no-files-found: error

  sign-linux:
    needs: [validate, binaries]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: cloudsmith-linux-*
          merge-multiple: true
          path: binaries

      - name: Import signing key and create detached signatures
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          export GNUPGHOME="$(mktemp -d)"
          chmod 700 "$GNUPGHOME"
          printf 'allow-loopback-pinentry\n' > "$GNUPGHOME/gpg-agent.conf"
          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import
          for TARGET in linux-x86_64-gnu linux-x86_64-musl linux-aarch64-gnu linux-aarch64-musl; do
            ARCHIVE="binaries/cloudsmith-${VERSION}-${TARGET}.tar.gz"
            test -f "${ARCHIVE}"
            gpg --batch --yes --pinentry-mode loopback --passphrase "${GPG_PASSPHRASE}" \
              --detach-sign --output "${ARCHIVE}.sig" "${ARCHIVE}"
            gpg --verify "${ARCHIVE}.sig" "${ARCHIVE}"
          done
          gpgconf --kill gpg-agent || true

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-signatures
          path: binaries/*.sig
          if-no-files-found: error
          retention-days: 14

  stage-github:
    needs: [validate, binaries, python-distributions, sign-linux]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: cloudsmith-*
          merge-multiple: true
          path: binaries

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-distributions
          path: python

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: linux-signatures
          path: binaries

      - name: Stage verified assets on a draft release
        run: |
          set -euo pipefail
          TARGETS=(
            linux-x86_64-gnu
            linux-x86_64-musl
            linux-aarch64-gnu
            linux-aarch64-musl
            macos-arm64
            macos-x86_64
            windows-x86_64
          )
          ASSETS=()
          for TARGET in "${TARGETS[@]}"; do
            EXT=.tar.gz
            if [ "${TARGET}" = windows-x86_64 ]; then
              EXT=.zip
            fi
            ARCHIVE="binaries/cloudsmith-${VERSION}-${TARGET}${EXT}"
            CHECKSUM="${ARCHIVE}.sha256"
            test -f "${ARCHIVE}"
            test -f "${CHECKSUM}"
            ASSETS+=("${ARCHIVE}" "${CHECKSUM}")
            SIGNATURE="${ARCHIVE}.sig"
            if [ -f "${SIGNATURE}" ]; then
              ASSETS+=("${SIGNATURE}")
            fi
          done
          SDIST="python/cloudsmith_cli-${VERSION}.tar.gz"
          WHEEL="python/cloudsmith_cli-${VERSION}-py3-none-any.whl"
          test -f "${SDIST}"
          test -f "${WHEEL}"
          ASSETS+=("${SDIST}" "${WHEEL}")
          (
            cd binaries
            sha256sum \
              "cloudsmith-${VERSION}-linux-x86_64-gnu.tar.gz" \
              "cloudsmith-${VERSION}-linux-x86_64-musl.tar.gz" \
              "cloudsmith-${VERSION}-linux-aarch64-gnu.tar.gz" \
              "cloudsmith-${VERSION}-linux-aarch64-musl.tar.gz" \
              "cloudsmith-${VERSION}-macos-arm64.tar.gz" \
              "cloudsmith-${VERSION}-macos-x86_64.tar.gz" \
              "cloudsmith-${VERSION}-windows-x86_64.zip" \
              > SHA256SUMS
          )
          ASSETS+=("binaries/SHA256SUMS")

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            test "$(gh release view "${GITHUB_REF_NAME}" --json isDraft -q .isDraft)" = true
          else
            gh release create "${GITHUB_REF_NAME}" \
              --draft \
              --verify-tag \
              --title "Release ${GITHUB_REF_NAME}" \
              --generate-notes
          fi
          gh release upload "${GITHUB_REF_NAME}" --clobber "${ASSETS[@]}"

  publish-cloudsmith:
    needs: [validate, stage-github, python-distributions, sign-linux]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    env:
      CLOUDSMITH_NAMESPACE: ${{ vars.CLOUDSMITH_NAMESPACE }}
      CLOUDSMITH_REPO: ${{ vars.CLOUDSMITH_REPO }}
      CLOUDSMITH_ORG: ${{ vars.CLOUDSMITH_NAMESPACE }}
      CLOUDSMITH_SERVICE_SLUG: ${{ vars.CLOUDSMITH_SERVICE_SLUG }}
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: cloudsmith-*
          merge-multiple: true
          path: binaries

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-distributions
          path: python

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: linux-signatures
          path: binaries

      - name: Set up the built cloudsmith binary on the runner
        run: |
          set -euo pipefail
          ARCHIVE="binaries/cloudsmith-${VERSION}-linux-x86_64-gnu.tar.gz"
          test -f "${ARCHIVE}"
          DEST="${RUNNER_TEMP}/cloudsmith-cli"
          mkdir -p "${DEST}"
          tar -xzf "${ARCHIVE}" -C "${DEST}"
          chmod +x "${DEST}/cloudsmith/cloudsmith"
          echo "${DEST}/cloudsmith" >> "$GITHUB_PATH"

      - name: Pre-authenticate with OIDC
        run: |
          set -euo pipefail
          cloudsmith whoami

      - name: Publish binaries and Python distributions
        run: |
          set -euo pipefail
          TARGETS=(
            linux-x86_64-gnu
            linux-x86_64-musl
            linux-aarch64-gnu
            linux-aarch64-musl
            macos-arm64
            macos-x86_64
            windows-x86_64
          )
          for TARGET in "${TARGETS[@]}"; do
            EXT=.tar.gz
            if [ "${TARGET}" = windows-x86_64 ]; then
              EXT=.zip
            fi
            ARCHIVE="binaries/cloudsmith-${VERSION}-${TARGET}${EXT}"
            test -f "${ARCHIVE}"
            cloudsmith push raw \
              "${CLOUDSMITH_NAMESPACE}/${CLOUDSMITH_REPO}" \
              "${ARCHIVE}" \
              --name "cloudsmith-cli-${TARGET}" \
              --version "${VERSION}" \
              --republish
            case "${TARGET}" in
              linux-*)
                test -f "${ARCHIVE}.sig"
                cloudsmith push raw \
                  "${CLOUDSMITH_NAMESPACE}/${CLOUDSMITH_REPO}" \
                  "${ARCHIVE}.sig" \
                  --name "cloudsmith-cli-${TARGET}-sig" \
                  --version "${VERSION}" \
                  --republish
                ;;
            esac
          done
          cloudsmith push python \
            "${CLOUDSMITH_NAMESPACE}/cli" \
            "python/cloudsmith_cli-${VERSION}.tar.gz" \
            --republish
          cloudsmith push python \
            "${CLOUDSMITH_NAMESPACE}/cli" \
            "python/cloudsmith_cli-${VERSION}-py3-none-any.whl" \
            --republish

  publish-pypi:
    # Disabled for the fork dogfooding test — publish to Cloudsmith only.
    if: false
    needs: [validate, stage-github, python-distributions]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-distributions
          path: dist

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist/
          skip-existing: true

  publish-containers:
    needs: [validate, stage-github]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    env:
      CLOUDSMITH_NAMESPACE: ${{ vars.CLOUDSMITH_NAMESPACE }}
      CLOUDSMITH_REPO: ${{ vars.CLOUDSMITH_REPO }}
      CLOUDSMITH_SERVICE_SLUG: ${{ vars.CLOUDSMITH_SERVICE_SLUG }}
      CLOUDSMITH_ORG: ${{ vars.CLOUDSMITH_NAMESPACE }}
      DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USER }}
      HAS_DOCKERHUB: ${{ secrets.DOCKERHUB_PAT != '' }}
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: cloudsmith-linux-*-musl
          merge-multiple: true
          path: binaries

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: cloudsmith-linux-x86_64-gnu
          merge-multiple: true
          path: binaries

      - name: Set up the built cloudsmith binary on the runner
        run: |
          set -euo pipefail
          ARCHIVE="binaries/cloudsmith-${VERSION}-linux-x86_64-gnu.tar.gz"
          test -f "${ARCHIVE}"
          DEST="${RUNNER_TEMP}/cloudsmith-cli"
          mkdir -p "${DEST}"
          tar -xzf "${ARCHIVE}" -C "${DEST}"
          chmod +x "${DEST}/cloudsmith/cloudsmith"
          mkdir -p "${HOME}/.local/bin"
          echo "${DEST}/cloudsmith" >> "$GITHUB_PATH"
          echo "${HOME}/.local/bin" >> "$GITHUB_PATH"

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Authenticate to docker.cloudsmith.io via OIDC credential helper
        run: |
          set -euo pipefail
          cloudsmith whoami
          cloudsmith credential-helper install docker

      - name: Authenticate to Docker Hub
        if: env.HAS_DOCKERHUB == 'true'
        env:
          DOCKERHUB_PAT: ${{ secrets.DOCKERHUB_PAT }}
        run: |
          set -euo pipefail
          echo "${DOCKERHUB_PAT}" \
            | docker login \
              -u "${DOCKERHUB_USER}" \
              --password-stdin

      - name: Build once and push the same image to both registries
        run: |
          set -euo pipefail
          AMD64="binaries/cloudsmith-${VERSION}-linux-x86_64-musl.tar.gz"
          ARM64="binaries/cloudsmith-${VERSION}-linux-aarch64-musl.tar.gz"
          test -f "${AMD64}"
          test -f "${AMD64}.sha256"
          test -f "${ARM64}"
          test -f "${ARM64}.sha256"
          TAGS=(-t "docker.cloudsmith.io/${CLOUDSMITH_NAMESPACE}/${CLOUDSMITH_REPO}/cloudsmith-cli:${VERSION}")
          if [ "${HAS_DOCKERHUB}" = "true" ]; then
            TAGS+=(-t "cloudsmith/cloudsmith-cli:${VERSION}")
          fi
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg "CLOUDSMITH_CLI_VERSION=${VERSION}" \
            "${TAGS[@]}" \
            --push .

  publish-github:
    # Disabled for the fork dogfooding test — the GitHub release stays a draft;
    # we publish to Cloudsmith only.
    if: false
    needs:
      - validate
      - stage-github
      - publish-cloudsmith
      - publish-pypi
      - publish-containers
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Publish the fully replicated draft release
        run: gh release edit "${GITHUB_REF_NAME}" --draft=false
