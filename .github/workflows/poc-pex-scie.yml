name: PoC — PEX scie single binary

on:
  workflow_dispatch:
    inputs:
      pex_version:
        description: 'PEX version pin'
        required: false
        default: '2.95.2'
      python_version:
        description: 'Build interpreter Python version'
        required: false
        default: '3.12'
  push:
    branches:
      - 'poc/pex-scie'

permissions:
  contents: read

# PEX 2.95.2 supports linux glibc/musl × {x86_64, aarch64} and macOS × {x86_64,
# aarch64} via --scie-platform. Windows scie targets are EXCLUDED in
# pex/scie/__init__.py at choices=[...] — confirmed at pex@main on 2026-05-21.
# Windows binaries require a separate path (e.g. PyInstaller 6.20) and are out
# of scope for this PoC.

jobs:
  build:
    name: build (${{ matrix.target.name }})
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: linux-x86_64
            runner: ubuntu-latest
            scie_platform: linux-x86_64
            complete_platform: linux-x86_64-py312
          - name: linux-aarch64
            runner: ubuntu-24.04-arm
            scie_platform: linux-aarch64
            complete_platform: linux-aarch64-py312
          - name: musl-linux-x86_64
            runner: ubuntu-latest
            scie_platform: musl-linux-x86_64
            complete_platform: linux-x86_64-musl-py312
          - name: musl-linux-aarch64
            runner: ubuntu-24.04-arm
            scie_platform: musl-linux-aarch64
            complete_platform: linux-aarch64-musl-py312
          - name: macos-x86_64
            runner: macos-13
            scie_platform: macos-x86_64
            complete_platform: ''
          - name: macos-aarch64
            runner: macos-latest
            scie_platform: macos-aarch64
            complete_platform: ''
    runs-on: ${{ matrix.target.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: ${{ inputs.python_version || '3.12' }}

      - name: Install PEX
        shell: bash
        env:
          PEX_VERSION: ${{ inputs.pex_version || '2.95.2' }}
        run: |
          python -m pip install --upgrade pip
          pip install "pex==${PEX_VERSION}" setuptools wheel

      - name: Resolve VERSION
        id: ver
        shell: bash
        run: |
          VERSION=$(cat cloudsmith_cli/data/VERSION)
          {
            echo "VERSION=${VERSION}"
            echo "SHORT_SHA=${GITHUB_SHA:0:7}"
          } >> "$GITHUB_OUTPUT"

      - name: Build PEX scie
        shell: bash
        env:
          VERSION: ${{ steps.ver.outputs.VERSION }}
          SHORT_SHA: ${{ steps.ver.outputs.SHORT_SHA }}
          TARGET: ${{ matrix.target.name }}
          SCIE_PLATFORM: ${{ matrix.target.scie_platform }}
          COMPLETE_PLATFORM: ${{ matrix.target.complete_platform }}
        run: |
          mkdir -p dist
          # Output file basename ends with SCIE_PLATFORM so PEX produces a single
          # file (it replaces the underlying .pex when the suffix matches).
          # --scie-only is belt-and-suspenders: even on mismatch only the scie
          # is kept on disk.
          OUT="dist/cloudsmith-${VERSION}-${SHORT_SHA}-${SCIE_PLATFORM}"
          ARGS=(
            .
            --output-file "${OUT}"
            --console-script cloudsmith
            --scie eager
            --scie-only
            --scie-platform "${SCIE_PLATFORM}"
            --venv
          )
          if [ -n "${COMPLETE_PLATFORM}" ]; then
            ARGS+=(--complete-platform ".github/.platforms/${COMPLETE_PLATFORM}.json")
          fi
          echo "::group::pex command"
          printf '%q ' pex "${ARGS[@]}"
          echo
          echo "::endgroup::"
          pex "${ARGS[@]}"
          ls -lh dist/
          (cd dist && shasum -a 256 cloudsmith-* > "cloudsmith-${VERSION}-${SHORT_SHA}-${TARGET}.sha256")

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cloudsmith-${{ matrix.target.name }}
          path: dist/
          retention-days: 14
          if-no-files-found: error

  smoke-linux-glibc-x86_64:
    name: smoke linux glibc x86_64 no-Python
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b6d4604ae8881dac2b5c2bd6 # v4.3.0
        with:
          name: cloudsmith-linux-x86_64
          path: ./bin
      - name: Validate in debian:stable-slim (no Python on host)
        shell: bash
        run: |
          chmod +x ./bin/cloudsmith-*
          BIN_NAME=$(ls ./bin/cloudsmith-* | grep -v sha256 | xargs -n1 basename)
          echo "Binary under test: ${BIN_NAME}"
          docker run --rm -v "$PWD/bin:/work" -w /work debian:stable-slim sh -c "
            if command -v python3 >/dev/null 2>&1; then echo 'Python on host, test invalid'; exit 1; fi
            ./${BIN_NAME} --version
            ./${BIN_NAME} --help > /dev/null
            ./${BIN_NAME} mcp --help > /dev/null
          "

  smoke-linux-glibc-aarch64:
    name: smoke linux glibc aarch64 no-Python
    needs: build
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b6d4604ae8881dac2b5c2bd6 # v4.3.0
        with:
          name: cloudsmith-linux-aarch64
          path: ./bin
      - name: Validate in debian:stable-slim/arm64 (no Python on host)
        shell: bash
        run: |
          chmod +x ./bin/cloudsmith-*
          BIN_NAME=$(ls ./bin/cloudsmith-* | grep -v sha256 | xargs -n1 basename)
          echo "Binary under test: ${BIN_NAME}"
          docker run --rm --platform linux/arm64 -v "$PWD/bin:/work" -w /work debian:stable-slim sh -c "
            if command -v python3 >/dev/null 2>&1; then echo 'Python on host, test invalid'; exit 1; fi
            ./${BIN_NAME} --version
            ./${BIN_NAME} mcp --help > /dev/null
          "

  smoke-linux-musl-x86_64:
    name: smoke linux musl x86_64 no-Python
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b6d4604ae8881dac2b5c2bd6 # v4.3.0
        with:
          name: cloudsmith-musl-linux-x86_64
          path: ./bin
      - name: Validate on Alpine (pydantic-core load test)
        shell: bash
        run: |
          chmod +x ./bin/cloudsmith-*
          BIN_NAME=$(ls ./bin/cloudsmith-* | grep -v sha256 | xargs -n1 basename)
          echo "Binary under test: ${BIN_NAME}"
          docker run --rm -v "$PWD/bin:/work" -w /work alpine:latest sh -c "
            if command -v python3 >/dev/null 2>&1; then echo 'Python on host, test invalid'; exit 1; fi
            ./${BIN_NAME} --version
            ./${BIN_NAME} --help > /dev/null
            ./${BIN_NAME} mcp --help > /dev/null
          "

  smoke-linux-musl-aarch64:
    name: smoke linux musl aarch64 no-Python
    needs: build
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b6d4604ae8881dac2b5c2bd6 # v4.3.0
        with:
          name: cloudsmith-musl-linux-aarch64
          path: ./bin
      - name: Validate on Alpine aarch64 (pydantic-core load test)
        shell: bash
        run: |
          chmod +x ./bin/cloudsmith-*
          BIN_NAME=$(ls ./bin/cloudsmith-* | grep -v sha256 | xargs -n1 basename)
          echo "Binary under test: ${BIN_NAME}"
          docker run --rm --platform linux/arm64 -v "$PWD/bin:/work" -w /work alpine:latest sh -c "
            if command -v python3 >/dev/null 2>&1; then echo 'Python on host, test invalid'; exit 1; fi
            ./${BIN_NAME} --version
            ./${BIN_NAME} mcp --help > /dev/null
          "

  smoke-macos:
    name: smoke macos no-Python (${{ matrix.artifact }})
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: cloudsmith-macos-aarch64
            runner: macos-latest
          - artifact: cloudsmith-macos-x86_64
            runner: macos-13
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b6d4604ae8881dac2b5c2bd6 # v4.3.0
        with:
          name: ${{ matrix.artifact }}
          path: ./bin
      - name: Validate without Python on PATH
        shell: bash
        run: |
          chmod +x ./bin/cloudsmith-*
          BIN_NAME=$(ls ./bin/cloudsmith-* | grep -v sha256 | xargs -n1 basename)
          echo "Binary under test: ${BIN_NAME}"
          mkdir -p /tmp/no-python
          export PATH=/tmp/no-python
          if command -v python3 >/dev/null 2>&1; then echo "python3 still in PATH"; exit 1; fi
          ./bin/"${BIN_NAME}" --version
          ./bin/"${BIN_NAME}" --help > /dev/null
          ./bin/"${BIN_NAME}" mcp --help > /dev/null

  mcp-stdio:
    name: mcp stdio handshake (linux-x86_64)
    needs: smoke-linux-glibc-x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b6d4604ae8881dac2b5c2bd6 # v4.3.0
        with:
          name: cloudsmith-linux-x86_64
          path: ./bin
      - name: Send MCP initialize request
        shell: bash
        run: |
          chmod +x ./bin/cloudsmith-*
          BIN_NAME=$(ls ./bin/cloudsmith-* | grep -v sha256 | xargs -n1 basename)
          echo "Binary under test: ${BIN_NAME}"
          INIT='{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"poc","version":"0"}}}'
          OUT=$(printf '%s\n' "$INIT" | timeout 15 ./bin/"${BIN_NAME}" mcp start 2>/tmp/mcp.stderr || true)
          echo "stdout (first 5 lines):"
          echo "$OUT" | head -5
          echo "stderr (first 20 lines):"
          head -20 /tmp/mcp.stderr || true
          echo "$OUT" | head -1 | grep -q '"jsonrpc":"2.0"' || { echo 'No jsonrpc envelope in first line'; exit 1; }

  summary:
    name: PoC summary
    if: always()
    needs:
      - build
      - smoke-linux-glibc-x86_64
      - smoke-linux-glibc-aarch64
      - smoke-linux-musl-x86_64
      - smoke-linux-musl-aarch64
      - smoke-macos
      - mcp-stdio
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate
        shell: bash
        env:
          R_BUILD: ${{ needs.build.result }}
          R_LIN_GLIBC_X86: ${{ needs.smoke-linux-glibc-x86_64.result }}
          R_LIN_GLIBC_ARM: ${{ needs.smoke-linux-glibc-aarch64.result }}
          R_LIN_MUSL_X86: ${{ needs.smoke-linux-musl-x86_64.result }}
          R_LIN_MUSL_ARM: ${{ needs.smoke-linux-musl-aarch64.result }}
          R_MACOS: ${{ needs.smoke-macos.result }}
          R_MCP: ${{ needs.mcp-stdio.result }}
        run: |
          {
            echo "## PoC PEX-scie matrix"
            echo ""
            echo "Windows targets EXCLUDED: PEX 2.95.2 does not currently"
            echo "support \`--scie-platform windows-*\`. See workflow header."
            echo ""
            echo "| Job | Result |"
            echo "|-----|--------|"
            echo "| build | ${R_BUILD} |"
            echo "| smoke-linux-glibc-x86_64 | ${R_LIN_GLIBC_X86} |"
            echo "| smoke-linux-glibc-aarch64 | ${R_LIN_GLIBC_ARM} |"
            echo "| smoke-linux-musl-x86_64 | ${R_LIN_MUSL_X86} |"
            echo "| smoke-linux-musl-aarch64 | ${R_LIN_MUSL_ARM} |"
            echo "| smoke-macos | ${R_MACOS} |"
            echo "| mcp-stdio | ${R_MCP} |"
          } >> "$GITHUB_STEP_SUMMARY"
