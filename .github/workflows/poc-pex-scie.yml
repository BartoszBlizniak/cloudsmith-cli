name: PoC — PEX scie single binary

on:
  workflow_dispatch:
    inputs:
      pex_version:
        description: 'PEX version pin'
        required: false
        default: '2.95.2'
      python_version:
        description: 'Build interpreter Python version'
        required: false
        default: '3.12'
      pbs_release:
        description: 'python-build-standalone release tag'
        required: false
        default: '20260510'
  push:
    branches:
      - 'poc/pex-scie'

permissions:
  contents: read

# PEX 2.95.2 supports linux glibc/musl × {x86_64, aarch64} and macOS × {x86_64,
# aarch64} via --scie-platform. Windows scie targets are EXCLUDED in
# pex/scie/__init__.py at choices=[...] — confirmed at pex@main on 2026-05-21.
# Windows binaries require a separate path (e.g. PyInstaller 6.20) and are out
# of scope for this PoC.

jobs:
  build:
    name: build (${{ matrix.target.name }})
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: linux-x86_64
            runner: ubuntu-latest
            scie_platform: linux-x86_64
            complete_platform: linux-x86_64-py312
          - name: linux-aarch64
            runner: ubuntu-24.04-arm
            scie_platform: linux-aarch64
            complete_platform: linux-aarch64-py312
          - name: musl-linux-x86_64
            runner: ubuntu-latest
            scie_platform: musl-linux-x86_64
            complete_platform: linux-x86_64-musl-py312
          - name: musl-linux-aarch64
            runner: ubuntu-24.04-arm
            scie_platform: musl-linux-aarch64
            complete_platform: linux-aarch64-musl-py312
          - name: macos-aarch64
            runner: macos-latest
            scie_platform: macos-aarch64
            complete_platform: ''
    runs-on: ${{ matrix.target.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: ${{ inputs.python_version || '3.12' }}

      - name: Install PEX
        shell: bash
        env:
          PEX_VERSION: ${{ inputs.pex_version || '2.95.2' }}
        run: |
          python -m pip install --upgrade pip
          pip install "pex==${PEX_VERSION}" setuptools wheel

      - name: Resolve VERSION
        id: ver
        shell: bash
        run: |
          VERSION=$(cat cloudsmith_cli/data/VERSION)
          {
            echo "VERSION=${VERSION}"
            echo "SHORT_SHA=${GITHUB_SHA:0:7}"
          } >> "$GITHUB_OUTPUT"

      - name: Build PEX scie
        shell: bash
        env:
          VERSION: ${{ steps.ver.outputs.VERSION }}
          SHORT_SHA: ${{ steps.ver.outputs.SHORT_SHA }}
          TARGET: ${{ matrix.target.name }}
          SCIE_PLATFORM: ${{ matrix.target.scie_platform }}
          COMPLETE_PLATFORM: ${{ matrix.target.complete_platform }}
          PBS_RELEASE: ${{ inputs.pbs_release || '20260510' }}
          # science (PEX scie's internal lift tool) reads GitHub API to look
          # up the PBS release tarball URL. The 60/hour unauthenticated quota
          # is shared across the GHA macOS fleet IP pool and gets exhausted
          # routinely; authenticate with the workflow's GITHUB_TOKEN to use
          # the 5,000/hour authenticated quota instead.
          # Env naming convention: SCIENCE_AUTH_<HOST-UPPER-UNDERSCORED>_BEARER
          SCIENCE_AUTH_API_GITHUB_COM_BEARER: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          # OUT_BASE has no platform suffix; PEX appends --scie-platform.
          # Result file: <OUT_BASE>-<SCIE_PLATFORM>. --scie-only suppresses
          # the underlying .pex when PEX honours it (still does not on 2.95.2
          # for musl, so we clean up below).
          OUT_BASE="dist/cloudsmith-${VERSION}-${SHORT_SHA}"
          ARGS=(
            .
            --output-file "${OUT_BASE}"
            --console-script cloudsmith
            --scie eager
            --scie-only
            --scie-name-style platform-file-suffix
            --scie-pbs-release "${PBS_RELEASE}"
            --scie-platform "${SCIE_PLATFORM}"
            --venv
          )
          if [ -n "${COMPLETE_PLATFORM}" ]; then
            ARGS+=(--complete-platform ".github/.platforms/${COMPLETE_PLATFORM}.json")
          fi
          echo "::group::pex command"
          printf '%q ' pex "${ARGS[@]}"
          echo
          echo "::endgroup::"
          pex "${ARGS[@]}"
          echo "::group::raw dist listing"
          ls -lh dist/
          echo "::endgroup::"
          # Force single-binary: keep the largest file (the scie), drop any
          # intermediate .pex that PEX 2.95.2 leaves behind on musl. Cross-
          # platform `ls -S` is reliable on both Linux and macOS runners.
          SCIE_FILE="dist/$(ls -S dist/ | head -1)"
          for f in dist/cloudsmith-*; do
            [ "$f" = "$SCIE_FILE" ] && continue
            echo "removing non-scie artifact: $f"
            rm -f "$f"
          done
          echo "::group::final dist listing"
          ls -lh dist/
          echo "::endgroup::"
          (cd dist && shasum -a 256 cloudsmith-* > "cloudsmith-${VERSION}-${SHORT_SHA}-${TARGET}.sha256")

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cloudsmith-${{ matrix.target.name }}
          path: dist/
          retention-days: 14
          if-no-files-found: error

  smoke-linux-glibc-x86_64:
    name: smoke linux glibc x86_64 no-Python
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: cloudsmith-linux-x86_64
          path: ./bin
      - name: Validate in debian:stable-slim (no Python on host)
        shell: bash
        run: |
          chmod +x ./bin/cloudsmith-*
          BIN_NAME=$(ls -S ./bin/cloudsmith-* | grep -v '\.sha256$' | head -1 | xargs basename)
          echo "Binary under test: ${BIN_NAME}"
          docker run --rm -v "$PWD/bin:/work" -w /work debian:stable-slim sh -c "
            if command -v python3 >/dev/null 2>&1; then echo 'Python on host, test invalid'; exit 1; fi
            ./${BIN_NAME} --version
            ./${BIN_NAME} --help > /dev/null
            ./${BIN_NAME} mcp --help > /dev/null
          "

  smoke-linux-glibc-aarch64:
    name: smoke linux glibc aarch64 no-Python
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: cloudsmith-linux-aarch64
          path: ./bin
      - name: Validate in debian:stable-slim/arm64 (no Python on host)
        shell: bash
        run: |
          chmod +x ./bin/cloudsmith-*
          BIN_NAME=$(ls -S ./bin/cloudsmith-* | grep -v '\.sha256$' | head -1 | xargs basename)
          echo "Binary under test: ${BIN_NAME}"
          docker run --rm --platform linux/arm64 -v "$PWD/bin:/work" -w /work debian:stable-slim sh -c "
            if command -v python3 >/dev/null 2>&1; then echo 'Python on host, test invalid'; exit 1; fi
            ./${BIN_NAME} --version
            ./${BIN_NAME} mcp --help > /dev/null
          "

  smoke-linux-musl-x86_64:
    name: smoke linux musl x86_64 no-Python
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: cloudsmith-musl-linux-x86_64
          path: ./bin
      - name: Validate on Alpine (pydantic-core load test)
        shell: bash
        run: |
          chmod +x ./bin/cloudsmith-*
          BIN_NAME=$(ls -S ./bin/cloudsmith-* | grep -v '\.sha256$' | head -1 | xargs basename)
          echo "Binary under test: ${BIN_NAME}"
          docker run --rm -v "$PWD/bin:/work" -w /work alpine:latest sh -c "
            if command -v python3 >/dev/null 2>&1; then echo 'Python on host, test invalid'; exit 1; fi
            ./${BIN_NAME} --version
            ./${BIN_NAME} --help > /dev/null
            ./${BIN_NAME} mcp --help > /dev/null
          "
      - name: MCP stdio handshake on Alpine
        timeout-minutes: 2
        shell: bash
        run: |
          BIN_NAME=$(ls -S ./bin/cloudsmith-* | grep -v '\.sha256$' | head -1 | xargs basename)
          INIT='{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"poc","version":"0"}}}'
          docker run --rm \
            -e BIN_NAME="$BIN_NAME" \
            -e INIT="$INIT" \
            -v "$PWD/bin:/work" -w /work alpine:latest sh -c '
              set -e
              OUT=$(printf "%s\n" "$INIT" | timeout 15 ./${BIN_NAME} mcp start 2>/tmp/mcp.stderr | head -1)
              echo "stdout: $OUT"
              echo "stderr (first 20 lines):"; head -20 /tmp/mcp.stderr || true
              echo "$OUT" | grep -q "\"jsonrpc\":\"2.0\"" || { echo "MCP handshake failed on musl x86_64"; exit 1; }
            '

  smoke-linux-musl-aarch64:
    name: smoke linux musl aarch64 no-Python
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: cloudsmith-musl-linux-aarch64
          path: ./bin
      - name: Validate on Alpine aarch64 (pydantic-core load test)
        shell: bash
        run: |
          chmod +x ./bin/cloudsmith-*
          BIN_NAME=$(ls -S ./bin/cloudsmith-* | grep -v '\.sha256$' | head -1 | xargs basename)
          echo "Binary under test: ${BIN_NAME}"
          docker run --rm --platform linux/arm64 -v "$PWD/bin:/work" -w /work alpine:latest sh -c "
            if command -v python3 >/dev/null 2>&1; then echo 'Python on host, test invalid'; exit 1; fi
            ./${BIN_NAME} --version
            ./${BIN_NAME} mcp --help > /dev/null
          "

  smoke-macos-aarch64:
    name: smoke macos aarch64 no-Python
    needs: build
    if: ${{ !cancelled() }}
    runs-on: macos-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: cloudsmith-macos-aarch64
          path: ./bin
      - name: Validate without Python on PATH
        shell: bash
        run: |
          chmod +x ./bin/cloudsmith-*
          BIN_NAME=$(ls -S ./bin/cloudsmith-* | grep -v '\.sha256$' | head -1 | xargs basename)
          echo "Binary under test: ${BIN_NAME}"
          mkdir -p /tmp/no-python
          export PATH=/tmp/no-python
          if command -v python3 >/dev/null 2>&1; then echo "python3 still in PATH"; exit 1; fi
          ./bin/"${BIN_NAME}" --version
          ./bin/"${BIN_NAME}" --help > /dev/null
          ./bin/"${BIN_NAME}" mcp --help > /dev/null
      - name: MCP stdio handshake on macOS aarch64
        timeout-minutes: 2
        shell: bash
        run: |
          BIN_NAME=$(ls -S ./bin/cloudsmith-* | grep -v '\.sha256$' | head -1 | xargs basename)
          INIT='{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"poc","version":"0"}}}'
          # Earlier step already proved `mcp --help` runs without python3 on
          # PATH; here keep the GH-runner PATH so coreutils stay available
          # and rely on `head -1` SIGPIPE to terminate the mcp server.
          set +o pipefail
          OUT=$(printf '%s\n' "$INIT" | ./bin/"${BIN_NAME}" mcp start 2>/tmp/mcp.stderr | head -1)
          set -o pipefail
          echo "stdout: $OUT"
          echo "stderr (first 20 lines):"; head -20 /tmp/mcp.stderr || true
          echo "$OUT" | grep -q '"jsonrpc":"2.0"' || { echo 'MCP handshake failed on macOS aarch64'; exit 1; }

  # macos-x86_64 is its own pipeline (build + smoke) because macos-13
  # GitHub-hosted Intel runners have low capacity. Decoupling stops a
  # queued macos-x86_64 build from blocking smoke jobs for the other
  # five targets.
  build-macos-x86_64:
    name: build (macos-x86_64)
    runs-on: macos-13
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: ${{ inputs.python_version || '3.12' }}
      - name: Install PEX
        shell: bash
        env:
          PEX_VERSION: ${{ inputs.pex_version || '2.95.2' }}
        run: |
          python -m pip install --upgrade pip
          pip install "pex==${PEX_VERSION}" setuptools wheel
      - name: Resolve VERSION
        id: ver
        shell: bash
        run: |
          VERSION=$(cat cloudsmith_cli/data/VERSION)
          {
            echo "VERSION=${VERSION}"
            echo "SHORT_SHA=${GITHUB_SHA:0:7}"
          } >> "$GITHUB_OUTPUT"
      - name: Build PEX scie (macos-x86_64)
        shell: bash
        env:
          VERSION: ${{ steps.ver.outputs.VERSION }}
          SHORT_SHA: ${{ steps.ver.outputs.SHORT_SHA }}
          PBS_RELEASE: ${{ inputs.pbs_release || '20260510' }}
          SCIENCE_AUTH_API_GITHUB_COM_BEARER: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          OUT_BASE="dist/cloudsmith-${VERSION}-${SHORT_SHA}"
          pex . \
            --output-file "${OUT_BASE}" \
            --console-script cloudsmith \
            --scie eager \
            --scie-only \
            --scie-name-style platform-file-suffix \
            --scie-pbs-release "${PBS_RELEASE}" \
            --scie-platform macos-x86_64 \
            --venv
          ls -lh dist/
          SCIE_FILE="dist/$(ls -S dist/ | head -1)"
          for f in dist/cloudsmith-*; do
            [ "$f" = "$SCIE_FILE" ] && continue
            rm -f "$f"
          done
          (cd dist && shasum -a 256 cloudsmith-* > "cloudsmith-${VERSION}-${SHORT_SHA}-macos-x86_64.sha256")
      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cloudsmith-macos-x86_64
          path: dist/
          retention-days: 14
          if-no-files-found: error

  smoke-macos-x86_64:
    name: smoke macos x86_64 no-Python
    needs: build-macos-x86_64
    if: ${{ !cancelled() }}
    runs-on: macos-13
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: cloudsmith-macos-x86_64
          path: ./bin
      - name: Validate without Python on PATH
        shell: bash
        run: |
          chmod +x ./bin/cloudsmith-*
          BIN_NAME=$(ls -S ./bin/cloudsmith-* | grep -v '\.sha256$' | head -1 | xargs basename)
          echo "Binary under test: ${BIN_NAME}"
          mkdir -p /tmp/no-python
          export PATH=/tmp/no-python
          if command -v python3 >/dev/null 2>&1; then echo "python3 still in PATH"; exit 1; fi
          ./bin/"${BIN_NAME}" --version
          ./bin/"${BIN_NAME}" --help > /dev/null
          ./bin/"${BIN_NAME}" mcp --help > /dev/null

  mcp-stdio:
    name: mcp stdio handshake (linux-x86_64)
    needs: smoke-linux-glibc-x86_64
    if: ${{ !cancelled() && needs.smoke-linux-glibc-x86_64.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: cloudsmith-linux-x86_64
          path: ./bin
      - name: Send MCP initialize request
        timeout-minutes: 2
        shell: bash
        run: |
          chmod +x ./bin/cloudsmith-*
          BIN_NAME=$(ls -S ./bin/cloudsmith-* | grep -v '\.sha256$' | head -1 | xargs basename)
          echo "Binary under test: ${BIN_NAME}"
          INIT='{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"poc","version":"0"}}}'
          OUT=$(printf '%s\n' "$INIT" | timeout 15 ./bin/"${BIN_NAME}" mcp start 2>/tmp/mcp.stderr || true)
          echo "stdout (first 5 lines):"
          echo "$OUT" | head -5
          echo "stderr (first 20 lines):"
          head -20 /tmp/mcp.stderr || true
          echo "$OUT" | head -1 | grep -q '"jsonrpc":"2.0"' || { echo 'No jsonrpc envelope in first line'; exit 1; }

  # Q#2: Run the linux-x86_64 PEX-scie binary across multiple glibc/musl
  # distros to establish the PBS glibc floor. PBS release 20260510 ships
  # CPython 3.14.5 statically linked against the glibc on the build host
  # (manylinux2014 == glibc 2.17). The binary is single-arch (x86_64).
  glibc-floor:
    name: glibc floor (${{ matrix.distro }})
    needs: smoke-linux-glibc-x86_64
    if: ${{ !cancelled() && needs.smoke-linux-glibc-x86_64.result == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro:
          - rockylinux:8
          - rockylinux:9
          - ubuntu:20.04
          - ubuntu:22.04
          - amazonlinux:2
          - amazonlinux:2023
          - debian:11
          - debian:12
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: cloudsmith-linux-x86_64
          path: ./bin
      - name: Run binary in ${{ matrix.distro }}
        shell: bash
        run: |
          chmod +x ./bin/cloudsmith-*
          BIN_NAME=$(ls -S ./bin/cloudsmith-* | grep -v '\.sha256$' | head -1 | xargs basename)
          echo "Binary under test: ${BIN_NAME}"
          echo "Distro: ${{ matrix.distro }}"
          docker run --rm \
            -e BIN_NAME="$BIN_NAME" \
            -v "$PWD/bin:/work" -w /work "${{ matrix.distro }}" sh -c '
              set -e
              # Record glibc version if available
              (ldd --version 2>&1 || true) | head -1
              if [ -f /etc/os-release ]; then grep -E "^(NAME|VERSION_ID)=" /etc/os-release; fi
              ./${BIN_NAME} --version
              ./${BIN_NAME} mcp --help > /dev/null
            '

  # Q#12: Build linux-x86_64 PEX-scie twice on the same runner with
  # SOURCE_DATE_EPOCH pinned and compare sha256. If different, surface
  # diffoscope output as a job artifact.
  reproducibility:
    name: reproducibility (linux-x86_64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: ${{ inputs.python_version || '3.12' }}
      - name: Install PEX
        shell: bash
        env:
          PEX_VERSION: ${{ inputs.pex_version || '2.95.2' }}
        run: |
          python -m pip install --upgrade pip
          pip install "pex==${PEX_VERSION}" setuptools wheel
      - name: Build twice with SOURCE_DATE_EPOCH
        id: build2x
        shell: bash
        env:
          PBS_RELEASE: ${{ inputs.pbs_release || '20260510' }}
          SCIENCE_AUTH_API_GITHUB_COM_BEARER: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          for run in 1 2; do
            workdir="run-${run}"
            rm -rf "$workdir"
            mkdir -p "$workdir"
            SOURCE_DATE_EPOCH=1700000000 PEX_ROOT="${PWD}/${workdir}/.pex_cache" \
              pex . \
                --output-file "${workdir}/cloudsmith.bin" \
                --console-script cloudsmith \
                --scie eager \
                --scie-only \
                --scie-name-style platform-file-suffix \
                --scie-pbs-release "${PBS_RELEASE}" \
                --scie-platform linux-x86_64 \
                --complete-platform .github/.platforms/linux-x86_64-py312.json \
                --venv
            # PEX appends platform suffix; pick the largest file
            SCIE=$(ls -S "${workdir}/cloudsmith.bin"* | head -1)
            mv "${SCIE}" "${workdir}/scie.bin"
          done
          SHA1=$(sha256sum run-1/scie.bin | awk '{print $1}')
          SHA2=$(sha256sum run-2/scie.bin | awk '{print $1}')
          {
            echo "sha1=${SHA1}"
            echo "sha2=${SHA2}"
            if [ "${SHA1}" = "${SHA2}" ]; then echo "match=true"; else echo "match=false"; fi
          } >> "$GITHUB_OUTPUT"
          echo "## Reproducibility (linux-x86_64)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| run | sha256 |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 1 | \`${SHA1}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 2 | \`${SHA2}\` |" >> "$GITHUB_STEP_SUMMARY"
          if [ "${SHA1}" = "${SHA2}" ]; then
            echo "**Result:** byte-identical." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "**Result:** divergent — diffoscope artifact uploaded." >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Diffoscope on divergence
        if: steps.build2x.outputs.match == 'false'
        shell: bash
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends diffoscope
          diffoscope --max-report-size=4194304 --text repro-diff.txt run-1/scie.bin run-2/scie.bin || true
          head -200 repro-diff.txt || true
      - name: Upload diff
        if: steps.build2x.outputs.match == 'false'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: reproducibility-diff
          path: |
            repro-diff.txt
            run-1/scie.bin
            run-2/scie.bin
          retention-days: 14
          if-no-files-found: warn

  summary:
    name: PoC summary
    if: always()
    needs:
      - build
      - build-macos-x86_64
      - smoke-linux-glibc-x86_64
      - smoke-linux-glibc-aarch64
      - smoke-linux-musl-x86_64
      - smoke-linux-musl-aarch64
      - smoke-macos-aarch64
      - smoke-macos-x86_64
      - mcp-stdio
      - glibc-floor
      - reproducibility
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate
        shell: bash
        env:
          R_BUILD: ${{ needs.build.result }}
          R_BUILD_MAC_X86: ${{ needs.build-macos-x86_64.result }}
          R_LIN_GLIBC_X86: ${{ needs.smoke-linux-glibc-x86_64.result }}
          R_LIN_GLIBC_ARM: ${{ needs.smoke-linux-glibc-aarch64.result }}
          R_LIN_MUSL_X86: ${{ needs.smoke-linux-musl-x86_64.result }}
          R_LIN_MUSL_ARM: ${{ needs.smoke-linux-musl-aarch64.result }}
          R_MACOS_ARM: ${{ needs.smoke-macos-aarch64.result }}
          R_MACOS_X86: ${{ needs.smoke-macos-x86_64.result }}
          R_MCP: ${{ needs.mcp-stdio.result }}
          R_GLIBC: ${{ needs.glibc-floor.result }}
          R_REPRO: ${{ needs.reproducibility.result }}
        run: |
          {
            echo "## PoC PEX-scie matrix"
            echo ""
            echo "Windows targets EXCLUDED: PEX 2.95.2 \`pex/scie/__init__.py\`"
            echo "explicitly filters \`WINDOWS_X86_64\` and \`WINDOWS_AARCH64\`"
            echo "from \`--scie-platform\` choices. Tracking issue:"
            echo "https://github.com/pex-tool/pex/issues/2658"
            echo ""
            echo "| Job | Result |"
            echo "|-----|--------|"
            echo "| build (5 cells) | ${R_BUILD} |"
            echo "| build-macos-x86_64 | ${R_BUILD_MAC_X86} |"
            echo "| smoke-linux-glibc-x86_64 | ${R_LIN_GLIBC_X86} |"
            echo "| smoke-linux-glibc-aarch64 | ${R_LIN_GLIBC_ARM} |"
            echo "| smoke-linux-musl-x86_64 (incl. mcp stdio) | ${R_LIN_MUSL_X86} |"
            echo "| smoke-linux-musl-aarch64 | ${R_LIN_MUSL_ARM} |"
            echo "| smoke-macos-aarch64 (incl. mcp stdio) | ${R_MACOS_ARM} |"
            echo "| smoke-macos-x86_64 | ${R_MACOS_X86} |"
            echo "| mcp-stdio (linux-x86_64) | ${R_MCP} |"
            echo "| glibc-floor (8 distros) | ${R_GLIBC} |"
            echo "| reproducibility (linux-x86_64) | ${R_REPRO} |"
          } >> "$GITHUB_STEP_SUMMARY"
