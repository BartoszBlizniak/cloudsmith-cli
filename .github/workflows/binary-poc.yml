name: Binary PoC (PyInstaller)

on:
  push:
    branches:
      - binary-poc
      - "binary-poc/**"
  workflow_dispatch:
    inputs:
      mode:
        description: "Bundle mode (onefile or onedir)"
        required: false
        default: "onefile"
        type: choice
        options:
          - onefile
          - onedir

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  PYINSTALLER_VERSION: "6.20.0"
  CLOUDSMITH_BINARY_MODE: ${{ github.event.inputs.mode || 'onefile' }}
  # Test repo for push/pull e2e (#6). Job-level steps skip themselves if either
  # the API key secret or the namespace var is unset (e.g. fork without secrets).
  TEST_REPO_SLUG: binary-poc

jobs:
  setup-test-repo:
    name: Ensure $CLOUDSMITH_NAMESPACE/binary-poc raw repo exists
    runs-on: ubuntu-latest
    if: ${{ vars.CLOUDSMITH_NAMESPACE != '' }}
    env:
      CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
      CLOUDSMITH_NAMESPACE: ${{ vars.CLOUDSMITH_NAMESPACE }}
      CLOUDSMITH_NO_KEYRING: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install CLI from source
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .

      - name: Create binary-poc repo if missing
        env:
          REPO: ${{ env.TEST_REPO_SLUG }}
        run: |
          set -eu
          if cloudsmith list repos "${CLOUDSMITH_NAMESPACE}/${REPO}" -F json 2>/dev/null \
              | grep -q "\"slug\": \"${REPO}\""; then
            echo "Repo ${CLOUDSMITH_NAMESPACE}/${REPO} already exists, skipping create."
            exit 0
          fi
          echo "Repo ${CLOUDSMITH_NAMESPACE}/${REPO} not found, creating."
          cat > /tmp/repo-config.json <<EOF
          {
            "name": "${REPO}",
            "description": "Cloudsmith CLI binary PoC test repo (autocreated by binary-poc.yml).",
            "repository_type_str": "Public",
            "slug": "${REPO}"
          }
          EOF
          cloudsmith repos create "${CLOUDSMITH_NAMESPACE}" /tmp/repo-config.json

  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runs-on }}
    container: ${{ matrix.container }}
    needs: [setup-test-repo]
    # Allow build to run even when setup-test-repo is skipped (no secrets);
    # the auth e2e + keyring secret-dependent steps gate themselves further down.
    if: ${{ always() && (needs.setup-test-repo.result == 'success' || needs.setup-test-repo.result == 'skipped') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64-glibc
            runs-on: ubuntu-latest
            shell: bash
          - target: linux-arm64-glibc
            runs-on: ubuntu-24.04-arm
            shell: bash
          - target: linux-amd64-musl
            runs-on: ubuntu-latest
            container: python:3.12-alpine
            shell: sh
          # linux-arm64-musl is split into its own job below: GitHub Actions
          # JS actions don't run inside Alpine containers on ARM64 runners
          # ("JavaScript Actions in Alpine containers are only supported on
          # x64 Linux runners"), so we bypass the container: field and use
          # docker run from the host runner instead.
          - target: macos-arm64
            runs-on: macos-latest
            shell: bash
          - target: macos-amd64
            runs-on: macos-15-intel
            shell: bash
          - target: windows-amd64
            # GitHub is migrating both windows-latest and windows-2025 to the
            # windows-2025-vs2026 image on 2026-06-15. Pin to the future image
            # explicitly so the build is deterministic across the migration
            # window and the runner annotation goes quiet.
            runs-on: windows-2025-vs2026
            shell: bash
          - target: windows-arm64
            runs-on: windows-11-arm
            shell: bash

    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - name: Install build deps (Alpine)
        if: contains(matrix.target, 'musl')
        run: |
          apk add --no-cache git bash build-base musl-dev libffi-dev openssl-dev \
            zlib-dev binutils ca-certificates curl

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python (host)
        if: ${{ !contains(matrix.target, 'musl') }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Show Python version
        run: |
          python --version || python3 --version
          python -m pip --version || python3 -m pip --version

      - name: Install runtime + PyInstaller
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .
          python -m pip install "pyinstaller==${PYINSTALLER_VERSION}"

      - name: Build binary
        env:
          CLOUDSMITH_BINARY_MODE: ${{ env.CLOUDSMITH_BINARY_MODE }}
        run: |
          python -m PyInstaller --clean --noconfirm packaging/pyinstaller/cloudsmith-cli.spec
          ls -la dist || dir dist

      - name: Stage artifact (onefile, POSIX)
        if: env.CLOUDSMITH_BINARY_MODE == 'onefile' && !startsWith(matrix.runs-on, 'windows')
        run: |
          mkdir -p out
          cp dist/cloudsmith "out/cloudsmith-${{ matrix.target }}"
          chmod +x "out/cloudsmith-${{ matrix.target }}"
          ls -lh out/

      - name: Stage artifact (onefile, Windows)
        if: env.CLOUDSMITH_BINARY_MODE == 'onefile' && startsWith(matrix.runs-on, 'windows')
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force out | Out-Null
          Copy-Item dist/cloudsmith.exe -Destination "out/cloudsmith-${{ matrix.target }}.exe"
          Get-ChildItem out

      - name: Stage artifact (onedir, POSIX)
        if: env.CLOUDSMITH_BINARY_MODE == 'onedir' && !startsWith(matrix.runs-on, 'windows')
        run: |
          mkdir -p out
          tar -C dist -czf "out/cloudsmith-${{ matrix.target }}.tar.gz" cloudsmith
          ls -lh out/

      - name: Stage artifact (onedir, Windows)
        if: env.CLOUDSMITH_BINARY_MODE == 'onedir' && startsWith(matrix.runs-on, 'windows')
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force out | Out-Null
          Compress-Archive -Path dist/cloudsmith -DestinationPath "out/cloudsmith-${{ matrix.target }}.zip"
          Get-ChildItem out

      - name: Smoke test (POSIX, onefile)
        if: env.CLOUDSMITH_BINARY_MODE == 'onefile' && !startsWith(matrix.runs-on, 'windows')
        run: |
          set -eux
          BIN="$(pwd)/out/cloudsmith-${{ matrix.target }}"
          "$BIN" --version
          "$BIN" --help > /dev/null
          "$BIN" list repos --help > /dev/null
          "$BIN" push raw --help > /dev/null
          "$BIN" mcp --help > /dev/null
          CLOUDSMITH_NO_KEYRING=1 "$BIN" check service
          "$BIN" check cryptography-selftest

      - name: Smoke test (POSIX, onedir)
        if: env.CLOUDSMITH_BINARY_MODE == 'onedir' && !startsWith(matrix.runs-on, 'windows')
        run: |
          set -eux
          BIN="$(pwd)/dist/cloudsmith/cloudsmith"
          "$BIN" --version
          "$BIN" --help > /dev/null
          "$BIN" list repos --help > /dev/null
          "$BIN" mcp --help > /dev/null
          CLOUDSMITH_NO_KEYRING=1 "$BIN" check service
          "$BIN" check cryptography-selftest

      - name: Smoke test (Windows, onefile)
        if: env.CLOUDSMITH_BINARY_MODE == 'onefile' && startsWith(matrix.runs-on, 'windows')
        shell: pwsh
        run: |
          $bin = ".\out\cloudsmith-${{ matrix.target }}.exe"
          & $bin --version
          & $bin --help | Out-Null
          & $bin list repos --help | Out-Null
          & $bin mcp --help | Out-Null
          $env:CLOUDSMITH_NO_KEYRING = "1"
          & $bin check service
          & $bin check cryptography-selftest
          if ($LASTEXITCODE -ne 0) { throw "cryptography-selftest failed: $LASTEXITCODE" }

      - name: Smoke test (Windows, onedir)
        if: env.CLOUDSMITH_BINARY_MODE == 'onedir' && startsWith(matrix.runs-on, 'windows')
        shell: pwsh
        run: |
          $bin = ".\dist\cloudsmith\cloudsmith.exe"
          & $bin --version
          & $bin --help | Out-Null
          & $bin list repos --help | Out-Null
          & $bin mcp --help | Out-Null
          $env:CLOUDSMITH_NO_KEYRING = "1"
          & $bin check service
          & $bin check cryptography-selftest
          if ($LASTEXITCODE -ne 0) { throw "cryptography-selftest failed: $LASTEXITCODE" }

      - name: No-Python validation (Linux glibc onefile)
        if: env.CLOUDSMITH_BINARY_MODE == 'onefile' && startsWith(matrix.target, 'linux-') && !contains(matrix.target, 'musl')
        run: |
          docker run --rm -v "$(pwd)/out:/work" -w /work debian:stable-slim sh -c '
            ! command -v python > /dev/null
            ! command -v python3 > /dev/null
            ./cloudsmith-${{ matrix.target }} --version
            ./cloudsmith-${{ matrix.target }} --help > /dev/null
          '

      - name: No-Python validation (Linux musl onefile)
        if: env.CLOUDSMITH_BINARY_MODE == 'onefile' && contains(matrix.target, 'musl')
        run: |
          # Already in Alpine container; just strip PATH to a dir without python.
          mkdir -p /tmp/no-py
          env -i PATH=/tmp/no-py HOME=/tmp "./out/cloudsmith-${{ matrix.target }}" --version
          env -i PATH=/tmp/no-py HOME=/tmp "./out/cloudsmith-${{ matrix.target }}" --help > /dev/null

      - name: No-Python validation (macOS onefile)
        if: env.CLOUDSMITH_BINARY_MODE == 'onefile' && startsWith(matrix.target, 'macos-')
        run: |
          mkdir -p /tmp/no-py
          env -i PATH=/tmp/no-py HOME=/tmp "./out/cloudsmith-${{ matrix.target }}" --version
          env -i PATH=/tmp/no-py HOME=/tmp "./out/cloudsmith-${{ matrix.target }}" --help > /dev/null

      - name: No-Python validation (Windows onefile)
        if: env.CLOUDSMITH_BINARY_MODE == 'onefile' && startsWith(matrix.runs-on, 'windows')
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force C:\no-py | Out-Null
          $env:PATH = "C:\no-py"
          & ".\out\cloudsmith-${{ matrix.target }}.exe" --version
          & ".\out\cloudsmith-${{ matrix.target }}.exe" --help | Out-Null

      - name: MCP stdio init (POSIX onefile)
        if: env.CLOUDSMITH_BINARY_MODE == 'onefile' && !startsWith(matrix.runs-on, 'windows')
        run: |
          set -eu
          BIN="$(pwd)/out/cloudsmith-${{ matrix.target }}"
          printf '%s\n' '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"poc","version":"0.1"}}}' \
            | timeout 15 "$BIN" mcp start 2>&1 | head -5 || true

      # Q#5 keyring round-trip — synthetic set/get/delete via hidden
      # `check keyring-selftest` subcommand. Real keyring usage is only on the
      # SSO browser flow (not scriptable in CI), so the selftest is the only
      # non-interactive proof that the chosen backend works per OS.
      - name: Keyring round-trip (Linux glibc)
        if: env.CLOUDSMITH_BINARY_MODE == 'onefile' && startsWith(matrix.target, 'linux-') && contains(matrix.target, 'glibc')
        run: |
          set -eux
          BIN="$(pwd)/out/cloudsmith-${{ matrix.target }}"
          sudo apt-get update -y
          sudo apt-get install -y dbus-x11 gnome-keyring libsecret-1-0
          # `dbus-run-session` provides a fresh session bus; gnome-keyring-daemon
          # unlocks with an empty password (no login keyring yet) and serves the
          # SecretService API for `secretstorage` → `keyring` to call.
          export CLOUDSMITH_BIN="$BIN"
          dbus-run-session -- bash -eux -c '
            printf "\n" | gnome-keyring-daemon --unlock --components=secrets &
            sleep 1
            "$CLOUDSMITH_BIN" check keyring-selftest
          '

      - name: Keyring graceful degradation (Linux musl)
        if: env.CLOUDSMITH_BINARY_MODE == 'onefile' && contains(matrix.target, 'musl')
        run: |
          set +e
          BIN="$(pwd)/out/cloudsmith-${{ matrix.target }}"
          # Alpine has no Secret Service daemon by default; selftest is expected
          # to exit non-zero. Capture stderr to confirm the failure is a clean
          # KeyringError, not a crash. Then verify the documented fallback
          # (CLOUDSMITH_NO_KEYRING=1) still works.
          "$BIN" check keyring-selftest > /tmp/keyring-out.txt 2>&1
          rc=$?
          echo "selftest exit=$rc; output:"
          cat /tmp/keyring-out.txt
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "INFO: selftest passed on musl — backend is file-based (keyrings.alt installed)."
          else
            grep -qE "(NoKeyringError|FAIL: keyring)" /tmp/keyring-out.txt \
              || { echo "expected NoKeyringError or FAIL marker, got something else"; exit 1; }
          fi
          CLOUDSMITH_NO_KEYRING=1 "$BIN" check service

      - name: Keyring round-trip (macOS)
        if: env.CLOUDSMITH_BINARY_MODE == 'onefile' && startsWith(matrix.target, 'macos-')
        run: |
          set -eux
          BIN="$(pwd)/out/cloudsmith-${{ matrix.target }}"
          # Confirm a usable keychain is present + unlocked (CI runners ship
          # `runner` user with an unlocked login keychain by default). Signed
          # builds get different ACLs; this test exercises the unsigned path
          # only — signed retest is blocked on Q#16 (Apple Developer ID).
          security list-keychains -d user
          "$BIN" check keyring-selftest

      - name: Keyring round-trip (Windows)
        if: env.CLOUDSMITH_BINARY_MODE == 'onefile' && startsWith(matrix.runs-on, 'windows')
        shell: pwsh
        run: |
          $bin = ".\out\cloudsmith-${{ matrix.target }}.exe"
          & $bin check keyring-selftest
          if ($LASTEXITCODE -ne 0) { throw "keyring-selftest failed: $LASTEXITCODE" }

      # Q#6 push/pull e2e — proves the frozen binary speaks the full HTTP
      # stack (multipart upload, auth, pagination). Skips itself if either
      # the API key secret or namespace var is absent (e.g. PR from external
      # fork without secrets exposed).
      - name: Push/pull e2e (POSIX)
        if: env.CLOUDSMITH_BINARY_MODE == 'onefile' && !startsWith(matrix.runs-on, 'windows') && vars.CLOUDSMITH_NAMESPACE != ''
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
          CLOUDSMITH_NAMESPACE: ${{ vars.CLOUDSMITH_NAMESPACE }}
          CLOUDSMITH_NO_KEYRING: "1"
        run: |
          set -eux
          BIN="$(pwd)/out/cloudsmith-${{ matrix.target }}"
          PKG_NAME="fixture-${{ matrix.target }}.txt"
          PKG_VER="${GITHUB_RUN_ID}"
          mkdir -p e2e
          cd e2e
          printf 'binary-poc fixture\ntarget=%s\nrun=%s\ndate=%s\n' \
            "${{ matrix.target }}" "${GITHUB_RUN_ID}" "$(date -u +%FT%TZ)" > "${PKG_NAME}"
          # Default push waits for sync (-W disables that), then we wait a bit
          # ourselves so the file is actually retrievable by download below.
          "$BIN" push raw "${CLOUDSMITH_NAMESPACE}/${TEST_REPO_SLUG}" "${PKG_NAME}" \
            --name "${PKG_NAME}" --version "${PKG_VER}"
          "$BIN" download "${CLOUDSMITH_NAMESPACE}/${TEST_REPO_SLUG}" "${PKG_NAME}" \
            --version "${PKG_VER}" --outfile "downloaded-${PKG_NAME}" --yes
          cmp "${PKG_NAME}" "downloaded-${PKG_NAME}"
          echo "Push/pull e2e PASS for ${{ matrix.target }}"

      - name: Push/pull e2e (Windows)
        if: env.CLOUDSMITH_BINARY_MODE == 'onefile' && startsWith(matrix.runs-on, 'windows') && vars.CLOUDSMITH_NAMESPACE != ''
        shell: pwsh
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
          CLOUDSMITH_NAMESPACE: ${{ vars.CLOUDSMITH_NAMESPACE }}
          CLOUDSMITH_NO_KEYRING: "1"
        run: |
          $bin = ".\out\cloudsmith-${{ matrix.target }}.exe"
          $pkgName = "fixture-${{ matrix.target }}.txt"
          $pkgVer = "$env:GITHUB_RUN_ID"
          New-Item -ItemType Directory -Force e2e | Out-Null
          Set-Location e2e
          "binary-poc fixture target=${{ matrix.target }} run=$env:GITHUB_RUN_ID date=$(Get-Date -Format o)" `
            | Out-File -Encoding ascii $pkgName
          & $bin push raw "$env:CLOUDSMITH_NAMESPACE/$env:TEST_REPO_SLUG" $pkgName --name $pkgName --version $pkgVer
          if ($LASTEXITCODE -ne 0) { throw "push failed: $LASTEXITCODE" }
          & $bin download "$env:CLOUDSMITH_NAMESPACE/$env:TEST_REPO_SLUG" $pkgName --version $pkgVer --outfile "downloaded-$pkgName" --yes
          if ($LASTEXITCODE -ne 0) { throw "download failed: $LASTEXITCODE" }
          $a = (Get-FileHash $pkgName -Algorithm SHA256).Hash
          $b = (Get-FileHash "downloaded-$pkgName" -Algorithm SHA256).Hash
          if ($a -ne $b) { throw "Content mismatch: $a vs $b" }
          Write-Host "Push/pull e2e PASS for ${{ matrix.target }}"

      - name: Record size + startup (POSIX)
        if: ${{ !startsWith(matrix.runs-on, 'windows') }}
        run: |
          if [ "${CLOUDSMITH_BINARY_MODE}" = "onefile" ]; then
            BIN="$(pwd)/out/cloudsmith-${{ matrix.target }}"
            ls -lh "$BIN"
          else
            BIN="$(pwd)/dist/cloudsmith/cloudsmith"
            du -sh dist/cloudsmith
          fi
          for i in 1 2 3; do
            /usr/bin/time -p "$BIN" --version 2>&1 | tail -3 || true
          done

      - name: Record size + startup (Windows)
        if: startsWith(matrix.runs-on, 'windows')
        shell: pwsh
        run: |
          if ($env:CLOUDSMITH_BINARY_MODE -eq "onefile") {
            $bin = ".\out\cloudsmith-${{ matrix.target }}.exe"
            Get-Item $bin | Select-Object Name,Length
          } else {
            $bin = ".\dist\cloudsmith\cloudsmith.exe"
            Get-ChildItem dist\cloudsmith -Recurse | Measure-Object -Property Length -Sum | Select-Object Sum
          }
          1..3 | ForEach-Object { Measure-Command { & $bin --version } | Select-Object TotalSeconds }

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cloudsmith-${{ matrix.target }}-${{ env.CLOUDSMITH_BINARY_MODE }}
          path: out/
          if-no-files-found: error
          retention-days: 14

  build-linux-arm64-musl:
    name: build (linux-arm64-musl)
    runs-on: ubuntu-24.04-arm
    needs: [setup-test-repo]
    if: ${{ always() && (needs.setup-test-repo.result == 'success' || needs.setup-test-repo.result == 'skipped') }}
    env:
      TARGET: linux-arm64-musl
      CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
      CLOUDSMITH_NAMESPACE: ${{ vars.CLOUDSMITH_NAMESPACE }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Build + smoke-test in Alpine container
        run: |
          set -eux
          docker run --rm --platform linux/arm64 \
            -v "$PWD:/work" -w /work \
            -e CLOUDSMITH_BINARY_MODE \
            -e PYINSTALLER_VERSION \
            -e TARGET \
            -e CLOUDSMITH_API_KEY \
            -e CLOUDSMITH_NAMESPACE \
            -e TEST_REPO_SLUG \
            -e GITHUB_RUN_ID \
            python:3.12-alpine sh -eux -c '
              apk add --no-cache git bash build-base musl-dev libffi-dev \
                openssl-dev zlib-dev binutils ca-certificates curl coreutils
              python -m pip install --upgrade pip
              python -m pip install -r requirements.txt
              python -m pip install -e .
              python -m pip install "pyinstaller==${PYINSTALLER_VERSION}"
              python -m PyInstaller --clean --noconfirm packaging/pyinstaller/cloudsmith-cli.spec
              ls -la dist
              if [ "${CLOUDSMITH_BINARY_MODE}" = "onefile" ]; then
                mkdir -p out
                cp dist/cloudsmith "out/cloudsmith-${TARGET}"
                chmod +x "out/cloudsmith-${TARGET}"
                BIN="$(pwd)/out/cloudsmith-${TARGET}"
              else
                mkdir -p out
                tar -C dist -czf "out/cloudsmith-${TARGET}.tar.gz" cloudsmith
                BIN="$(pwd)/dist/cloudsmith/cloudsmith"
              fi
              "$BIN" --version
              "$BIN" --help > /dev/null
              "$BIN" list repos --help > /dev/null
              "$BIN" mcp --help > /dev/null
              CLOUDSMITH_NO_KEYRING=1 "$BIN" check service
              "$BIN" check cryptography-selftest
              # Q#5 graceful keyring degradation on Alpine (no Secret Service).
              set +e
              "$BIN" check keyring-selftest > /tmp/keyring-out.txt 2>&1
              rc=$?
              set -e
              echo "keyring-selftest exit=$rc; output:"
              cat /tmp/keyring-out.txt
              if [ "$rc" -eq 0 ]; then
                echo "INFO: musl keyring passed — likely file backend via keyrings.alt."
              else
                grep -qE "(NoKeyringError|FAIL: keyring)" /tmp/keyring-out.txt \
                  || { echo "expected NoKeyringError or FAIL marker, got something else"; exit 1; }
              fi
              # Q#6 push/pull e2e (only when secrets are present).
              if [ -n "${CLOUDSMITH_API_KEY:-}" ] && [ -n "${CLOUDSMITH_NAMESPACE:-}" ]; then
                PKG_NAME="fixture-${TARGET}.txt"
                PKG_VER="${GITHUB_RUN_ID}"
                mkdir -p e2e && cd e2e
                printf "binary-poc fixture\ntarget=%s\nrun=%s\ndate=%s\n" \
                  "${TARGET}" "${GITHUB_RUN_ID}" "$(date -u +%FT%TZ)" > "${PKG_NAME}"
                CLOUDSMITH_NO_KEYRING=1 "$BIN" push raw "${CLOUDSMITH_NAMESPACE}/${TEST_REPO_SLUG}" "${PKG_NAME}" \
                  --name "${PKG_NAME}" --version "${PKG_VER}"
                CLOUDSMITH_NO_KEYRING=1 "$BIN" download "${CLOUDSMITH_NAMESPACE}/${TEST_REPO_SLUG}" "${PKG_NAME}" \
                  --version "${PKG_VER}" --outfile "downloaded-${PKG_NAME}" --yes
                cmp "${PKG_NAME}" "downloaded-${PKG_NAME}"
                echo "Push/pull e2e PASS for ${TARGET}"
                cd ..
              else
                echo "Skipping push/pull e2e: CLOUDSMITH_API_KEY or CLOUDSMITH_NAMESPACE unset."
              fi
              mkdir -p /tmp/no-py
              env -i PATH=/tmp/no-py HOME=/tmp "$BIN" --version
              env -i PATH=/tmp/no-py HOME=/tmp "$BIN" --help > /dev/null
              for i in 1 2 3; do
                /usr/bin/time -p "$BIN" --version 2>&1 | tail -3 || true
              done
            '

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cloudsmith-linux-arm64-musl-${{ env.CLOUDSMITH_BINARY_MODE }}
          path: out/
          if-no-files-found: error
          retention-days: 14

  checksums:
    name: SHA256SUMS
    needs: [build, build-linux-arm64-musl]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist

      - name: Generate SHA256SUMS
        run: |
          set -eu
          cd dist
          find . -type f \( -name 'cloudsmith-*' -o -name '*.tar.gz' -o -name '*.zip' \) -print0 \
            | xargs -0 -I{} sha256sum "{}" | tee ../SHA256SUMS
          cd ..
          cat SHA256SUMS

      - name: Upload SHA256SUMS
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SHA256SUMS
          path: SHA256SUMS
